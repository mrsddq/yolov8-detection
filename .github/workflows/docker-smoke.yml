name: Docker Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - requirements.txt
      - configs/**
      - data/**
      - models/**
      - scripts/**
      - tests/**
      - .github/workflows/docker-smoke.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - requirements.txt
      - configs/**
      - data/**
      - models/**
      - scripts/**
      - tests/**
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t yolov8-detection:smoke .
      - name: Show inference help
        run: docker run --rm yolov8-detection:smoke --help
      - name: Run tests in Docker
        run: docker run --rm --entrypoint python yolov8-detection:smoke -m unittest discover -s tests
