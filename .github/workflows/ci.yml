name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python files
        run: python -m compileall scripts tests
      - name: Run portfolio contract tests
        run: python -m unittest discover -s tests -p "test_portfolio_contract.py"
